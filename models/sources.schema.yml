version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: sales of Greenweez / we have on row per product_id found in each orders_id
        tests:
          - unique:
              column_name: "(pdt_id || '_' || orders_id)"
        columns:
          - name: date_date
          - name: orders_id
          - name: pdt_id 
          - name: revenue
          - name: quantity
      - name: product
        identifier: raw_gz_product
        description: products of Greenweez
        columns:
          - name: products_id
            tests: 
              - unique
              - not_null
          - name: purchase_price
      - name: ship
        identifier: raw_gz_ship
        description: orders id, shipping_fee et ship_cost of Greenwwwz
        columns:
          - name: orders_id
            tests: 
              - unique
              - not_null
          - name: shipping_fee
          - name: logcost
          - name: ship_cost
